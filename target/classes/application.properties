spring.application.name=digital-wallet-backend

# ===== PostgreSQL Database =====
spring.datasource.url=jdbc:postgresql://localhost:5432/wallet_db
spring.datasource.username=postgres
spring.datasource.password=wallet123

# ===== JPA / Hibernate =====
# update = auto-create/alter tables from entities (great for development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Server =====
server.port=8080

# ===== JWT =====
# This is a Base64-encoded secret used to sign tokens. Generate your own for production
# (never commit real secrets to GitHub) using: openssl rand -base64 32
jwt.secret=cGxlYXNlLWNoYW5nZS10aGlzLXNlY3JldC1rZXktZm9yLXByb2R1Y3Rpb24tdXNlLW9ubHk=
jwt.expiration-ms=86400000
